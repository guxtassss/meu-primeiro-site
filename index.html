<!DOCTYPE html>

<html>
    <head>
        <title>Meu site</title>
        <meta name="description" content="Um site tester criado por um iniciante">
        <meta  name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="estilo.css">


    </head>
    <body>
        <header><h1>Meu site!</h1>
        <p>Bem-vindo ao meu site!</p>
        </header>
        <main>
            <section> <! -- Seção sobre mim e o motivo da criação do site -->
                <h2>Sobre mim</h2>
                <p>Olá! Eu sou um <strong>iniciante</strong> em desenvolvimento web e estou aprendendo <strong> <abbr title="HyperText Markup Language">HTML</abbr>, <abbr title="Cascading Style Sheets">CSS</abbr> e <abbr title="JavaScript">JS</abbr></strong>.</p>
            </section>
            <section> <! -- SITEMA DE MULTIPLA ESCOLHA --/>
            <h2> qual a maioria dos programadores consideram a melhor linguagem de programação?</h2>
            <form>
                <input type="radio" name="linguagem" value="python" id="p1a">Python
                <input type="radio" name="linguagem" value="javascript" id="p1b">JavaScript
                <input type="radio" name="linguagem" value="java" id="p1c">Java
                <input type="radio" name="linguagem" value="c++" id="p1d">C++
                <input type="submit" value="Enviar">
            </section>
            <section> <! -- SITEMA DE MULTIPLA ESCOLHA --/>
            <h2> qual a faixa etária dos programadores mais ativos?</h2>
            <form>
                <input type="text "name="faixa_etaria" id="p2" placeholder="Digite a faixa etária dos programadores mais ativos">
            </form>
            </section>

        </main>
        <footer></footer>
    </body>


</html>
